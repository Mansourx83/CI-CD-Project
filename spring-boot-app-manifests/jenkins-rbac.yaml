apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins


---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-role

rules:

- apiGroups: [""]
  resources:
  - pods
  - services
  - secrets
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - update


- apiGroups: ["apps"]
  resources:
  - deployments
  - replicasets
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - update
  - patch


- apiGroups: ["apps"]
  resources:
  - deployments/status
  verbs:
  - get



---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-binding

subjects:

- kind: ServiceAccount
  name: jenkins
  namespace: jenkins


roleRef:

  kind: ClusterRole
  name: jenkins-role
  apiGroup: rbac.authorization.k8s.io
